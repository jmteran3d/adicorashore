<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Créditos</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .hidden { display: none; }
    #historialTable { margin-top: 20px; border-collapse: collapse; }
    #historialTable th, #historialTable td { border: 1px solid #ddd; padding: 8px; text-align: center; }
  </style>
</head>
<body>
  <h1>Simulador de Créditos</h1>

  <!-- Formulario para simular crédito -->
  <div id="simuladorCredito">
    <h2>Simula tu Crédito</h2>
    <label for="monto">Monto: </label>
    <input type="number" id="monto" min="10000" placeholder="Monto mínimo $10,000"><br><br>
    <label for="cuotas">Número de cuotas: </label>
    <select id="cuotas">
      <option value="3">3 cuotas</option>
      <option value="6">6 cuotas</option>
      <option value="12">12 cuotas</option>
      <option value="24">24 cuotas</option>
    </select><br><br>
    <button id="simularBtn">Simular Crédito</button>
  </div>

  <div id="resultadoSimulacion" class="hidden">
    <h2>Resumen del Crédito</h2>
    <p id="resumenCredito"></p>
    <button id="verDetalleBtn">Ver Detalle de Cuotas</button>
  </div>

  <div id="detalleCuotas" class="hidden">
    <h2>Detalle de Cuotas</h2>
    <ul id="listadoCuotas"></ul>
    <button id="volverBtn">Volver</button>
  </div>

  <!-- Consultar historial -->
  <div id="consultarHistorial">
    <h2>Consultar Historial de Créditos</h2>
    <button id="historialBtn">Ver Historial</button>
    <table id="historialTable" class="hidden">
      <thead>
        <tr>
          <th>Monto</th>
          <th>Cuotas</th>
          <th>Monto Total</th>
          <th>Valor Cuota</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="main.js"></script>
</body>
</html>
